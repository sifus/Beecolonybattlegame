<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond hexagonal avec texture cire -->
  <g opacity="0.95">
    <!-- Hexagone de fond -->
    <path d="M64 8 L104 32 L104 80 L64 104 L24 80 L24 32 Z" 
          fill="url(#grad1)" 
          stroke="#78350F" 
          stroke-width="4"/>
    
    <!-- Dégradé doré -->
    <defs>
      <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#FDB022;stop-opacity:1" />
        <stop offset="50%" style="stop-color:#F59E0B;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
      </linearGradient>
      
      <linearGradient id="beeBody" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
      </linearGradient>
      
      <linearGradient id="beeStripe" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#78350F;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#451A03;stop-opacity:1" />
      </linearGradient>
    </defs>
  </g>
  
  <!-- Abeille stylisée -->
  <g transform="translate(64, 64)">
    <!-- Aile gauche -->
    <ellipse cx="-18" cy="-8" rx="15" ry="20" 
             fill="rgba(255, 255, 255, 0.7)" 
             stroke="#78350F" 
             stroke-width="2"
             transform="rotate(-30 -18 -8)"/>
    
    <!-- Aile droite -->
    <ellipse cx="18" cy="-8" rx="15" ry="20" 
             fill="rgba(255, 255, 255, 0.7)" 
             stroke="#78350F" 
             stroke-width="2"
             transform="rotate(30 18 -8)"/>
    
    <!-- Corps principal -->
    <ellipse cx="0" cy="0" rx="20" ry="28" 
             fill="url(#beeBody)" 
             stroke="#78350F" 
             stroke-width="3"/>
    
    <!-- Rayures -->
    <rect x="-20" y="-8" width="40" height="6" 
          fill="url(#beeStripe)" 
          rx="3"/>
    <rect x="-20" y="2" width="40" height="6" 
          fill="url(#beeStripe)" 
          rx="3"/>
    <rect x="-20" y="12" width="40" height="6" 
          fill="url(#beeStripe)" 
          rx="3"/>
    
    <!-- Tête -->
    <circle cx="0" cy="-24" r="12" 
            fill="url(#beeBody)" 
            stroke="#78350F" 
            stroke-width="3"/>
    
    <!-- Yeux -->
    <circle cx="-5" cy="-25" r="3.5" fill="#78350F"/>
    <circle cx="5" cy="-25" r="3.5" fill="#78350F"/>
    <circle cx="-4" cy="-26" r="1.5" fill="white"/>
    <circle cx="6" cy="-26" r="1.5" fill="white"/>
    
    <!-- Antennes -->
    <path d="M -4 -34 Q -8 -40 -6 -44" 
          stroke="#78350F" 
          stroke-width="2.5" 
          fill="none" 
          stroke-linecap="round"/>
    <path d="M 4 -34 Q 8 -40 6 -44" 
          stroke="#78350F" 
          stroke-width="2.5" 
          fill="none" 
          stroke-linecap="round"/>
    <circle cx="-6" cy="-44" r="2.5" fill="#78350F"/>
    <circle cx="6" cy="-44" r="2.5" fill="#78350F"/>
    
    <!-- Sourire mignon -->
    <path d="M -4 -20 Q 0 -18 4 -20" 
          stroke="#78350F" 
          stroke-width="2" 
          fill="none" 
          stroke-linecap="round"/>
    
    <!-- Dard -->
    <path d="M 0 28 L 0 36" 
          stroke="#78350F" 
          stroke-width="2.5" 
          stroke-linecap="round"/>
  </g>
  
  <!-- Texture hexagonale subtile -->
  <g opacity="0.1">
    <polygon points="40,20 48,24 48,32 40,36 32,32 32,24" 
             fill="none" stroke="white" stroke-width="1"/>
    <polygon points="88,20 96,24 96,32 88,36 80,32 80,24" 
             fill="none" stroke="white" stroke-width="1"/>
    <polygon points="40,68 48,72 48,80 40,84 32,80 32,72" 
             fill="none" stroke="white" stroke-width="1"/>
    <polygon points="88,68 96,72 96,80 88,84 80,80 80,72" 
             fill="none" stroke="white" stroke-width="1"/>
  </g>
</svg>
